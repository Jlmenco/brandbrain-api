
name: brand-brain-staging

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bb_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-brandbrain}
      POSTGRES_USER: ${POSTGRES_USER:-brandbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - bb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brandbrain} -d ${POSTGRES_DB:-brandbrain}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bb_redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD}"]
    volumes:
      - bb_redisdata:/data
    restart: unless-stopped

  api:
    build:
      context: ../../api
      dockerfile: Dockerfile
    container_name: bb_api
    environment:
      APP_ENV: staging
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-brandbrain}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-brandbrain}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-mock}
      AI_MODEL: ${AI_MODEL:-}
      AI_CONFIDENTIAL_MODE: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      STORAGE_BASE_PATH: /data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - bb_storage:/data/storage
    restart: unless-stopped

  worker:
    build:
      context: ../../worker
      dockerfile: Dockerfile
    container_name: bb_worker
    environment:
      APP_ENV: staging
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-brandbrain}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-brandbrain}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      WORKER_POLL_INTERVAL: "30"
      WORKER_BATCH_SIZE: "10"
      WORKER_MAX_RETRIES: "3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - bb_storage:/data/storage
    restart: unless-stopped

  web:
    build:
      context: ../../../brandbrain-web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_URL:-http://localhost}/api
    container_name: bb_web
    depends_on:
      - api
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: bb_nginx
    depends_on:
      - web
      - api
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  bb_pgdata:
  bb_redisdata:
  bb_storage:
