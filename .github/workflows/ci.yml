name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linter
        run: python -m py_compile app/main.py

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  worker-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run linter
        run: python -m py_compile worker/main.py

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
